        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - inactive
          description: 数据状态筛选
        - name: category
          in: query
          schema:
            type: string
          description: 数据分类编码精确匹配
        - name: source
          in: query
          schema:
            type: string
          description: 数据来源模糊匹配
        - name: provider
          in: query
          schema:
            type: string
