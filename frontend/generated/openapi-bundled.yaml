          description: 失败原因
        importedAt:
          type:
            - string
            - 'null'
          format: date-time
          description: 导入完成时间
        processedAt:
          type:
            - string
            - 'null'
          format: date-time
          description: 预处理完成时间
        metadata:
          $ref: '#/components/schemas/RasterMetadata'
    RasterMetadata:
      type: object
      required:
        - size
        - driver
        - coordinateSystem
        - bands
      properties:
        size:
          type: array
          description: 栅格像素尺寸 [width, height]
          items:
            type: integer
        driver:
          type: string
          description: GDAL 驱动简称
        coordinateSystem:
          oneOf:
            - type: string
            - type: integer
          description: 坐标系统 EPSG 或描述文本
        bands:
          type: array
          description: 波段元数据
          items:
            $ref: '#/components/schemas/RasterBandInfo'
    RasterBandInfo:
      type: object
      required:
        - band
        - type
        - description
        - colorInterpretation
        - min
        - max
        - isInteger
      properties:
        band:
          type: integer
          description: 1-based 波段编号
        type:
          type: string
          description: GDAL 波段类型
        description:
          type: string
          description: 波段描述
        colorInterpretation:
          type: string
          description: 颜色解释
        min:
          type: number
          description: 波段最小值
        max:
          type: number
          description: 波段最大值
        isInteger:
          type: boolean
          description: 是否为整型波段
    RasterSymbolizationRules:
      type: object
      additionalProperties: true
      description: 栅格符号化规则对象，具体结构由后端符号化规则引擎校验
    AsyncJobResponse:
      type: object
      required:
        - id
        - kind
        - status
        - progressPercent
        - messages
        - result
        - error
        - startedAt
        - finishedAt
      properties:
        id:
          type: string
          description: 异步任务 ID
        kind:
          type: string
          enum:
            - import
            - scan
            - render
            - export
          description: 任务类型
        status:
          type: string
          enum:
            - queued
            - running
            - ready
            - failed
          description: 任务状态
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
          description: 任务进度百分比
        messages:
          type: array
          description: 任务进度消息
          items:
            type: string
        result:
          oneOf:
            - $ref: '#/components/schemas/RasterRenderResult'
            - $ref: '#/components/schemas/RasterDataset'
            - $ref: '#/components/schemas/RasterDatasetScanResult'
            - $ref: '#/components/schemas/ExportJobResult'
            - type: 'null'
          description: 任务完成后的结果；未完成或失败时为 null
        error:
          type: string
          description: 失败原因
        startedAt:
          type: number
          format: double
          description: 任务创建时间戳
        finishedAt:
          type:
            - number
            - 'null'
          format: double
          description: 任务结束时间戳
    RasterDatasetScanResult:
      type: object
      required:
        - items
        - count
      properties:
        items:
          type: array
          description: 扫描或导入得到的栅格数据集
          items:
            $ref: '#/components/schemas/RasterDataset'
        count:
          type: integer
          description: 数据集数量
    ExportJobResult:
      type: object
      required:
        - filename
        - downloadUrl
      properties:
        filename:
          type: string
          description: 导出文件名
        downloadUrl:
          type: string
          description: 导出文件下载路径
    DirectoryTreeResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: 数据目录列表
          items:
            $ref: '#/components/schemas/Directory'
    Directory:
      type: object
      required:
        - id
        - name
        - code
        - parentId
        - description
        - sortOrder
        - resources
      properties:
        id:
          type: integer
          description: 目录 ID
        name:
          type: string
          description: 目录名称
        code:
          type: string
          description: 目录编码
        parentId:
          type:
            - integer
            - 'null'
          description: 父目录 ID
        description:
          type: string
          description: 目录描述
        sortOrder:
          type: integer
          description: 排序值
        resources:
          type: array
          description: 目录下的数据资源
          items:
            $ref: '#/components/schemas/DataResource'
    ResourceListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: 数据资源列表，可能包含统一 GeoPackage 中的临时矢量资源
          items:
            $ref: '#/components/schemas/ResourceListItem'
    ScanResponse:
      type: object
      required:
        - items
        - count
      properties:
        items:
          type: array
          description: 本次扫描发现或同步的资源
          items:
            $ref: '#/components/schemas/ResourceListItem'
        count:
          type: integer
          description: 资源数量
    ImportPreviewResponse:
      type: object
      required:
        - columns
        - rows
        - rowCount
        - suggestedTableName
        - suggestedName
        - detected
        - limitations
      properties:
        columns:
          type: array
          description: 表格列名
          items:
            type: string
        rows:
          type: array
          description: 前若干行预览数据，键为列名，值为文本
          items:
            type: object
            additionalProperties:
              type: string
        rowCount:
          type: integer
          description: 总行数
        suggestedTableName:
          type: string
          description: 建议入库表名
        suggestedName:
          type: string
          description: 建议数据名称
        detected:
          $ref: '#/components/schemas/ImportDetectedInfo'
        limitations:
          type: array
          description: 导入限制提示
          items:
            type: string
    ImportDetectedInfo:
      type: object
      required:
        - isGeographic
        - longitudeColumn
        - latitudeColumn
        - coordinateStats
        - validationIssues
      properties:
        isGeographic:
          type: boolean
          description: 是否自动识别为地理表
        longitudeColumn:
          type:
            - string
            - 'null'
          description: 自动识别的经度列
        latitudeColumn:
          type:
            - string
            - 'null'
          description: 自动识别的纬度列
        coordinateStats:
          oneOf:
            - $ref: '#/components/schemas/CoordinateStats'
            - type: 'null'
          description: 坐标统计，预览阶段为 null
        validationIssues:
          type: array
          description: 坐标校验问题，预览阶段为空数组
          items:
            $ref: '#/components/schemas/ValidationIssue'
    ImportValidateResponse:
      type: object
      required:
        - coordinateStats
        - validationIssues
      properties:
        coordinateStats:
          oneOf:
            - $ref: '#/components/schemas/CoordinateStats'
            - type: 'null'
          description: 坐标统计；非地理导入时为 null
        validationIssues:
          type: array
          description: 坐标校验问题
          items:
            $ref: '#/components/schemas/ValidationIssue'
    CoordinateStats:
      type: object
      required:
        - totalRows
        - validRows
        - missingRows
        - quantizationErrorMeters
      properties:
        totalRows:
          type: integer
          description: 总行数
        validRows:
          type: integer
          description: 坐标有效行数
        missingRows:
          type: integer
          description: 缺少或无效坐标行数
        quantizationErrorMeters:
          type: object
          required:
            - min
            - max
          description: 坐标文本小数位引入的位置误差范围，单位米
          properties:
            min:
              type:
                - number
                - 'null'
              description: 最小估算误差
            max:
              type:
                - number
                - 'null'
              description: 最大估算误差
    ImportCommitResponse:
      oneOf:
        - $ref: '#/components/schemas/GeographicImportCommitResponse'
        - $ref: '#/components/schemas/TableImportCommitResponse'
    GeographicImportCommitResponse:
      type: object
      required:
        - mode
        - resourceId
        - resourceName
        - layerName
        - tableName
        - importedRows
        - skippedRows
        - bounds
        - coordinateStats
        - validationIssues
      properties:
        mode:
          type: string
          enum:
            - geographic
          description: 地理表导入模式
        resourceId:
          type: integer
          description: 创建或更新的数据资源 ID
        resourceName:
          type: string
          description: 创建或更新的数据资源名称
        layerName:
          type: string
          description: 写入 GeoPackage 的图层名
        tableName:
          type: string
          description: 写入 GeoPackage 的图层名，与 layerName 相同
        importedRows:
          type: integer
          description: 成功导入行数
        skippedRows:
          type: integer
          description: 跳过行数
        bounds:
          type: array
          description: 导入数据边界 [minLng, minLat, maxLng, maxLat]，无有效坐标时为空数组
          items:
            type: number
        coordinateStats:
          $ref: '#/components/schemas/CoordinateStats'
        validationIssues:
          type: array
          description: 导入时发现的坐标校验问题
          items:
            $ref: '#/components/schemas/ValidationIssue'
    TableImportCommitResponse:
      type: object
      required:
        - mode
        - resourceId
        - resourceName
        - layerId
        - tableName
        - importedRows
        - skippedRows
        - coordinateStats
        - validationIssues
      properties:
        mode:
          type: string
          enum:
            - table
          description: 非地理表导入模式
        resourceId:
          type: integer
          description: 创建或更新的数据资源 ID
        resourceName:
          type: string
          description: 创建或更新的数据资源名称
        layerId:
          type:
            - integer
            - 'null'
          description: 非地理表不创建地图图层，固定为 null
        tableName:
          type: string
          description: SQLite 表名
        importedRows:
          type: integer
          description: 成功导入行数
        skippedRows:
          type: integer
          description: 跳过行数
        coordinateStats:
          oneOf:
            - $ref: '#/components/schemas/CoordinateStats'
            - type: 'null'
          description: 非地理导入固定为 null
        validationIssues:
          type: array
          description: 非地理导入固定为空数组
          items:
            $ref: '#/components/schemas/ValidationIssue'
    ImportErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: 导入失败说明
        issues:
          type: array
          description: 导入校验问题
          items:
            $ref: '#/components/schemas/ValidationIssue'
    ValidationIssue:
      type: object
      required:
        - code
        - message
        - blocking
      properties:
        code:
          type: string
          description: 问题代码
        message:
          type: string
          description: 问题说明
        blocking:
          type: boolean
          description: 是否阻断导入
        count:
          type: integer
          description: 受影响行数
        minMeters:
          type: number
          description: 坐标不确定性最小误差，单位米
        maxMeters:
          type: number
          description: 坐标不确定性最大误差，单位米
        ratio:
          type: number
          description: 坐标不确定性误差倍率
    ResourceProfileResponse:
      type: object
      required:
        - resource
        - fields
        - featureCount
        - geometryType
        - bounds
      properties:
        resource:
          $ref: '#/components/schemas/ResourceListItem'
        fields:
          type: array
          description: 属性字段信息
          items:
            $ref: '#/components/schemas/FieldInfo'
        featureCount:
          type:
            - integer
            - 'null'
          description: 矢量要素数量；栅格和非空间资源为 null
        geometryType:
          type: string
          description: 几何类型
        bounds:
          type: array
          description: WGS84 边界 [minLng, minLat, maxLng, maxLat]，无法计算时为空数组
          items:
            type: number
        raster:
          oneOf:
            - $ref: '#/components/schemas/RasterDataset'
            - type: 'null'
          description: 栅格资源详情；非栅格资源可能省略或为 null
    FieldInfo:
      type: object
      required:
        - name
        - type
        - nullable
        - sampleValues
        - description
      properties:
        name:
          type: string
          description: 字段名
        type:
          type: string
          description: 字段数据类型
        nullable:
          type: boolean
          description: 是否存在空值
        sampleValues:
          type: array
          description: 非空样例值
          items:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: 'null'
        description:
          type: string
          description: 字段描述
    QueryRequest:
      type: object
      required:
        - attributeFilters
        - spatialFilter
        - limit
      properties:
        attributeFilters:
          type: array
          description: 属性过滤条件
          items:
            $ref: '#/components/schemas/AttributeFilter'
        spatialFilter:
          oneOf:
            - $ref: '#/components/schemas/SpatialFilter'
            - type: 'null'
          description: 空间过滤条件；不启用空间过滤时为 null
        limit:
          type: integer
          default: 30000
          description: 返回结果上限
    AttributeFilter:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        field:
          type: string
          description: 字段名
        operator:
          type: string
          enum:
            - contains
            - eq
            - ne
            - gt
            - gte
            - lt
            - lte
            - between
          description: 过滤操作符
        value:
          type: string
          description: 过滤值
        valueTo:
          type: string
          description: between 操作符时使用的结束值
    SpatialFilter:
      type: object
      required:
        - mode
        - geometry
      properties:
        mode:
          type: string
          enum:
            - rectangle
            - circle
            - ellipse
            - polygon
          description: 空间过滤绘制模式
        geometry:
          $ref: '#/components/schemas/GeoJSONGeometry'
    QueryResponse:
      type: object
      required:
        - resourceId
        - resourceName
        - totalCount
        - returnedCount
        - limit
        - fields
        - geojson
        - warnings
      properties:
        resourceId:
          oneOf:
            - type: integer
            - type: string
          description: 查询资源 ID；临时 GeoPackage 图层查询时为字符串 ID
        resourceName:
          type: string
          description: 查询资源名称
        totalCount:
          type: integer
          description: 过滤后的总数
        returnedCount:
          type: integer
          description: 本次返回数量
        limit:
          type: integer
          description: 返回上限
        fields:
          type: array
          description: 查询结果字段
          items:
            $ref: '#/components/schemas/FieldInfo'
        geojson:
          $ref: '#/components/schemas/GeoJSONFeatureCollection'
        warnings:
          type: array
          description: 地理坐标校验警告
          items:
            $ref: '#/components/schemas/ValidationWarning'
    ExportRequest:
      type: object
      required:
        - reproject
        - clip
        - items
      properties:
        epsg:
          type:
            - integer
            - 'null'
          default: 4326
          description: 目标 EPSG，reproject 为 true 时使用
        reproject:
          type: boolean
          default: true
          description: 是否重投影导出
        clip:
          type: boolean
          default: false
          description: 是否按空间范围裁切
        clipGeometry:
          oneOf:
            - $ref: '#/components/schemas/GeoJSONGeometry'
            - type: 'null'
          description: 裁切 GeoJSON 几何
        items:
          type: array
          description: 待导出图层
          items:
            $ref: '#/components/schemas/ExportItem'
    ExportItem:
      type: object
      required:
        - layerType
        - name
      properties:
        layerType:
          type: string
          enum:
            - vector
            - raster
          description: 图层类型
        name:
          type: string
          description: 导出图层名称
        resourceId:
          type:
            - integer
            - 'null'
          description: 数据资源 ID；临时 GeoPackage 查询结果没有业务资源 ID，可省略或传 null
        geojson:
          oneOf:
            - $ref: '#/components/schemas/GeoJSONFeatureCollection'
            - type: 'null'
          description: 前端临时矢量查询结果
        datasetId:
          type:
            - integer
            - 'null'
          description: 栅格数据集 ID
        sourceCrs:
          oneOf:
            - type: string
            - type: integer
            - type: 'null'
          description: 源坐标系统
    LayerListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: 可加载图层列表
          items:
            oneOf:
              - $ref: '#/components/schemas/VectorLayerResource'
              - $ref: '#/components/schemas/MapLayer'
    AchievementListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: 已发布成果列表
          items:
            $ref: '#/components/schemas/Achievement'
    SearchResponse:
      type: object
      required:
        - resources
        - achievements
      properties:
        resources:
          type: array
          description: 匹配的数据资源
          items:
            $ref: '#/components/schemas/ResourceListItem'
        achievements:
          type: array
          description: 匹配的研究成果
          items:
            $ref: '#/components/schemas/Achievement'
    RasterDatasetListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          description: 栅格数据集列表
          items:
            $ref: '#/components/schemas/RasterDataset'
    RasterImportRequest:
      type: object
      required:
        - sourcePath
      properties:
        sourcePath:
          type: string
          description: 源文件相对路径（相对于科研数据根目录）
        name:
          type: string
          description: 数据集名称，默认取文件名
        async:
          type: boolean
          default: true
          description: 是否异步执行
    RasterRenderRequest:
      type: object
      required:
        - layerId
      properties:
        layerId:
          type: integer
          description: 栅格图层 ID
        rulesMode:
          type: string
          enum:
            - default
            - custom
          default: default
          description: 符号化规则模式
        rules:
          oneOf:
            - $ref: '#/components/schemas/RasterSymbolizationRules'
            - type: 'null'
          description: 自定义符号化规则
    RasterRenderAsyncRequest:
      type: object
      properties:
        layerId:
          type:
            - integer
            - 'null'
          description: 栅格图层 ID
        datasetId:
          type:
            - integer
            - 'null'
          description: 栅格数据集 ID
        rulesMode:
          type: string
          enum:
            - default
            - custom
          default: default
          description: 符号化规则模式
        rules:
          oneOf:
            - $ref: '#/components/schemas/RasterSymbolizationRules'
            - type: 'null'
          description: 自定义符号化规则
    RasterRenderResult:
      type: object
      required:
        - delivery
        - datasetId
        - layerId
        - styleHash
        - tileUrl
        - status
        - bounds3857
        - bounds4326
        - imageCoordinates
        - rules
      properties:
        delivery:
          type: string
          enum:
            - xyz
          description: 栅格交付方式
        datasetId:
          type: integer
          description: 栅格数据集 ID
        layerId:
          type:
            - integer
            - 'null'
          description: 关联图层 ID
        styleHash:
          type: string
          description: 符号化样式哈希
        tileUrl:
          type: string
          description: XYZ 瓦片 URL 模板
        status:
          type: string
          enum:
            - ready
          description: 渲染结果状态
        bounds3857:
          type: array
          description: EPSG:3857 边界
          items:
            type: number
        bounds4326:
          type: array
          description: WGS84 边界
          items:
            type: number
        imageCoordinates:
          type: array
          description: WGS84 图像角点坐标
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: number
        rules:
          $ref: '#/components/schemas/RasterSymbolizationRules'
    UniqueValuesRequest:
      type: object
      required:
        - datasetId
      properties:
        datasetId:
          type: integer
          description: 栅格数据集 ID
        band:
          type: integer
          default: 1
          description: 1-based 波段编号
    UniqueValuesResponse:
      type: object
      required:
        - band
        - items
      properties:
        band:
          type: integer
          description: 1-based 波段编号
        items:
          type: array
          description: 唯一值分类项
          items:
            type: object
            required:
              - value
              - color
              - label
            properties:
              value:
                type: number
                description: 栅格像元值
              color:
                type: string
                description: 分类颜色
              label:
                type: string
                description: 分类标签
    GeoJSONGeometry:
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - Point
            - LineString
            - Polygon
            - MultiPoint
            - MultiLineString
            - MultiPolygon
          description: GeoJSON 几何类型
        coordinates:
          description: GeoJSON 坐标数组
    LayerFeaturesResponse:
      description: 矢量图层要素响应，包含 GeoJSON FeatureCollection 和校验警告
      allOf:
        - $ref: '#/components/schemas/GeoJSONFeatureCollection'
        - type: object
          required:
            - warnings
          properties:
            warnings:
              type: array
              description: 地理坐标校验警告
              items:
                $ref: '#/components/schemas/ValidationWarning'
    ValidationWarning:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 警告代码，如 missing_geometry、invalid_longitude、coordinate_uncertainty
        count:
          type: integer
          description: 受影响的记录数
        message:
          type: string
          description: 警告描述
        minMeters:
          type: number
          description: 坐标不确定性最小误差，单位米
        maxMeters:
          type: number
          description: 坐标不确定性最大误差，单位米
        ratio:
          type: number
          description: 坐标不确定性误差倍率
    GeoJSONFeatureCollection:
      type: object
      required:
        - type
        - features
      properties:
        type:
          type: string
          enum:
            - FeatureCollection
          description: GeoJSON FeatureCollection 类型
        features:
