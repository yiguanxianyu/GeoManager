openapi: 3.1.0
info:
  title: 中亚胡杨林生态系统保护数据共享平台 API
  description: |
    中亚胡杨林生态系统保护数据共享平台后端接口文档。

    ## 认证方式
    本平台使用 Django Session 认证机制：
    1. `GET /api/auth/csrf/` 获取 CSRF Token
    2. `POST /api/auth/login/` 登录建立 Session
    3. 后续请求携带 `sessionid` Cookie 和 `X-CSRFToken` 请求头

    ## 权限体系
    - **功能权限**：24 项细粒度功能权限，通过用户组分配，按后台权限、日志权限、Dashboard 权限、数据权限、人员权限分组管理
    - **数据访问权限**：基于 `access_groups` 的数据隔离

    ## 错误处理
    所有错误响应包含 `detail` 字段描述错误原因。
    API 接口不会返回登录页 HTML：未认证请求返回 JSON `401`，CSRF 校验失败返回 JSON `403`。
  version: 0.1.0
  contact:
    name: API Support
    email: support@huyang.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:8000
    description: 开发环境
  - url: https://api.huyang.example.com
    description: 生产环境
tags:
  - name: 公共接口
    description: 无需认证的公共接口
  - name: 认证接口
    description: 用户认证相关接口
  - name: 数据目录
    description: 数据资源管理接口
  - name: 图层
    description: 地图图层接口
  - name: 成果
    description: 研究成果接口
  - name: 搜索
    description: 全局搜索接口
  - name: 栅格数据
    description: 栅格数据管理接口
  - name: 异步任务
    description: 异步任务状态查询接口
  - name: 管理后台
    description: Ant Design Pro 管理后台用户、用户组、权限偏好和用户可配置设置接口
paths:
  /api/bootstrap/:
    get:
      tags:
        - 公共接口
      summary: 获取系统启动配置
      description: 获取前端应用初始化所需的全局配置信息
      operationId: getBootstrap
      security: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/health/:
    get:
      tags:
        - 公共接口
      summary: 健康检查
      operationId: getHealth
      security: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/csrf/:
    get:
      tags:
        - 认证接口
      summary: 获取 CSRF Cookie
      description: 设置 csrftoken Cookie，后续所有非 GET 请求需读取此 Cookie 值
      operationId: getCsrfCookie
      security: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/login/:
    post:
      tags:
        - 认证接口
      summary: 用户登录
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/register/:
    post:
      tags:
        - 认证接口
      summary: 用户注册
      description: |
        注册新用户。系统首次初始化会自动创建用户名为 `admin` 的完整功能账号和超级管理员用户组，注册用户保持普通账号。
        注册功能受系统配置 `allowRegistration` 控制。
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/auth/logout/:
    post:
      tags:
        - 认证接口
      summary: 用户登出
      operationId: logout
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/auth/me/:
    get:
      tags:
        - 认证接口
      summary: 获取当前用户信息
      operationId: getCurrentUser
      security: []
      responses:
        '200':
          description: 已认证用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                    example: false
  /api/admin/profile/:
    get:
      tags:
        - 管理后台
      summary: 获取当前用户后台资料
      description: 返回当前登录用户的个人资料、已授予权限、主动关闭权限和有效权限。
      operationId: getAdminProfile
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/profile/update/:
    post:
      tags:
        - 管理后台
      summary: 更新当前用户后台资料
      description: 更新当前用户的用户名、展示名称、邮箱、头像和部门。
      operationId: updateAdminProfile
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProfileUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/profile/permissions/:
    post:
      tags:
        - 管理后台
      summary: 更新当前用户主动关闭的权限
      description: 用户只能关闭或重新开启已经由上级授予的功能权限，不能写入未授予权限。
      operationId: updateAdminProfilePermissions
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProfilePermissionsRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProfileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/profile/password/:
    post:
      tags:
        - 管理后台
      summary: 修改当前用户密码
      description: 校验当前密码、新密码至少 6 位和确认密码后更新密码，并记录操作日志。
      operationId: updateAdminProfilePassword
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProfilePasswordRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/admin/operation-logs/:
    get:
      tags:
        - 管理后台
      summary: 查询操作日志
      description: 基于真实操作日志表返回可分页、可筛选的后台操作日志。需要 `core.view_operation_logs`，实际返回范围由 `core.view_all_operation_logs`、`core.view_own_operation_logs`、`core.view_group_operation_logs` 和当前用户配置的 `operationLogGroupIds` 共同裁剪。可通过 `userId` 精确筛选授权范围内的指定用户日志。
      operationId: listAdminOperationLogs
      security:
        - sessionAuth: []
      parameters:
        - name: current
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 当前页码
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 20
          description: 每页数量
        - name: operator
          in: query
          schema:
            type: string
          description: 在授权日志范围内按操作用户名或显示名称模糊筛选
        - name: userId
          in: query
          schema:
            type: integer
          description: 在授权日志范围内按操作用户 ID 精确筛选
        - name: module
          in: query
          schema:
            type: string
          description: 按模块名称模糊筛选
        - name: action
          in: query
          schema:
            type: string
          description: 按操作动作模糊筛选
        - name: result
          in: query
          schema:
            type: string
            enum:
              - success
              - warning
              - failed
          description: 按操作结果筛选
        - name: keyword
          in: query
          schema:
            type: string
          description: 跨用户、模块、动作和摘要的关键词筛选
        - name: startTime
          in: query
          schema:
            type: string
          description: 操作时间起点，支持日期或日期时间字符串
        - name: endTime
          in: query
          schema:
            type: string
          description: 操作时间终点，支持日期或日期时间字符串
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOperationLogListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/dashboard/:
    get:
      tags:
        - 管理后台
      summary: 获取后台 Dashboard 统计
      description: 返回后台 Dashboard 首屏统计数据与指定周期活跃用户。登录用户均可进入后台 Dashboard；各展示卡片按 `core.view_dashboard_*_card` 权限独立返回，未授权卡片不会出现在响应中。活跃用户定义为周期内存在成功登录操作日志的去重用户。
      operationId: getAdminDashboard
      security:
        - sessionAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum:
              - day
              - week
              - month
            default: day
          description: 活跃用户统计周期，day 为今日按小时统计，week 为本周按日统计，month 为本月按日统计。
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/dashboard/server/:
    get:
      tags:
        - 管理后台
      summary: 获取后台 Dashboard 服务器监控
      description: 返回服务器 CPU、内存、硬盘型号、数量和使用情况等监控快照。需要 `core.view_dashboard_system_card`；没有系统信息权限时前端不展示服务器信息区域，前端每 5 秒刷新一次。
      operationId: getAdminDashboardServer
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardServerResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/users/:
    get:
      tags:
        - 用户管理
      summary: 获取用户列表
      description: 返回可配置用户及其用户组归属。需要 `core.manage_auth`。
      operationId: listUsers
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - 用户管理
      summary: 创建用户
      description: 具备 `core.manage_auth` 和 `core.create_user` 权限的管理员创建用户账号，创建时必须指定至少一个非超级管理员用户组。密码由后端自动生成并返回。该接口不受自助注册开关影响。
      operationId: createUser
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/users/{userId}/groups/:
    post:
      tags:
        - 用户管理
      summary: 更新用户所属用户组
      description: 为指定用户设置所属用户组。普通用户必须保留至少一个用户组，不能加入超级管理员用户组；当前登录用户和超级管理员用户的用户组不能在认证授权页修改。需要 `core.manage_auth`。
      operationId: updateUserGroups
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 用户 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserGroupUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/users/{userId}/permissions/:
    post:
      tags:
        - 用户管理
      summary: 更新用户单独授予的功能权限
      description: 为指定用户设置直接授予的功能权限。最终生效权限为用户组权限与用户直授权限合并后，再扣除用户主动关闭权限；当前登录用户不能在认证授权页修改自己的直授权限，应通过用户设置调整主动关闭权限。需要 `core.manage_auth` 和 `core.manage_feature_permissions`。
      operationId: updateUserPermissions
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 用户 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPermissionUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/users/{userId}/password/reset/:
    post:
      tags:
        - 用户管理
      summary: 重置用户密码
      description: 为指定用户生成随机新密码并立即生效。新密码规则与后台创建用户时一致，响应中的 `generatedPassword` 仅返回一次。不能重置当前登录用户密码。需要 `core.manage_auth`。
      operationId: resetUserPassword
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 用户 ID
      responses:
        '200':
          description: 重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPasswordResetResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/users/{userId}/:
    post:
      tags:
        - 用户管理
      summary: 更新用户状态或删除用户
      description: |
        根据请求体中的 `action` 字段执行不同操作：
        - 不提供 `action`：启用或停用指定用户账号
        - `delete`：删除指定用户账号

        不能操作当前登录用户或初始化管理员。需要 `core.manage_auth`。
      operationId: updateUserOrDelete
      security:
        - sessionAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 用户 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/UserUpdateRequest'
                - type: object
                  required:
                    - action
                  properties:
                    action:
                      type: string
                      enum:
                        - delete
                      description: 操作类型，delete 为删除用户
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UserInfo'
                  - $ref: '#/components/schemas/DetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/groups/:
    get:
      tags:
        - 用户管理
      summary: 获取用户组列表
      description: 返回全部 Django 用户组及其功能权限配置。需要 `core.manage_auth`。
      operationId: listGroups
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - 用户管理
      summary: 创建用户组
      description: 新增一个用户组并可同步设置功能权限。需要 `core.manage_auth` 和 `core.manage_feature_permissions`。
      operationId: createGroup
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/groups/{groupId}/:
    post:
      tags:
        - 用户管理
      summary: 更新或删除用户组
      description: |
        根据请求体中的 `action` 字段执行不同操作：
        - 不提供 `action`：更新用户组名称和功能权限
        - `delete`：删除空用户组（仅当用户组没有任何关联用户时允许）

        需要 `core.manage_auth`。
      operationId: updateOrDeleteGroup
      security:
        - sessionAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
          description: 用户组 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/GroupUpdateRequest'
                - type: object
                  required:
                    - action
                  properties:
                    action:
                      type: string
                      enum:
                        - delete
                      description: 操作类型，delete 为删除用户组
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Group'
                  - $ref: '#/components/schemas/DetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/settings/:
    get:
      tags:
        - 管理后台
      summary: 获取用户可配置设置
      description: 返回后台允许展示和修改的 application 配置，不返回 runtime 内部变量。需要 `core.manage_system_settings`。
      operationId: getAdminSettings
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
