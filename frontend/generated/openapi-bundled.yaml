  /api/catalog/import/preview/:
    post:
      tags:
        - 数据目录
      summary: 导入数据预检
      description: |
        解析上传的 Excel/CSV 第一张表，按文本读取字段，自动推测经纬度列，
        并返回样例行和字段列表。该接口不执行坐标数据校验，不写入数据。
      operationId: importPreview
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: .csv / .xls / .xlsx 文件
      responses:
        '200':
          description: 预检成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/catalog/import/validate/:
    post:
      tags:
        - 数据目录
      summary: 上传数据校验
      description: 按当前表单选择的导入类型和经纬度列校验上传文件，不写入数据
      operationId: importValidate
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - payload
              properties:
                file:
                  type: string
                  format: binary
                  description: 与预检一致的文件
                payload:
                  type: string
                  description: JSON 字符串，包含 importMode、longitudeColumn、latitudeColumn
      responses:
        '200':
          description: 校验成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportValidateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/catalog/import/commit/:
    post:
      tags:
        - 数据目录
      summary: 提交数据导入
      description: |
        将预检后的 Excel/CSV 导入统一存储。选择地理数据时写入 GeoPackage，
        选择非地理数据时写入 SQLite。接口会同步创建或更新 DataResource。
      operationId: importCommit
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - payload
              properties:
                file:
                  type: string
                  format: binary
                payload:
                  type: string
                  description: JSON 字符串，包含导入配置
      responses:
        '201':
          description: 导入成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCommitResponse'
        '400':
          description: 校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
