      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RasterRenderAsyncRequest'
      responses:
        '202':
          description: 任务已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/raster/unique-values/:
    post:
      tags:
        - 栅格数据
      summary: 获取栅格唯一值分类
      description: 获取指定栅格数据集某一波段的唯一值列表，用于唯一值符号化
      operationId: getUniqueValues
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UniqueValuesRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UniqueValuesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/raster/jobs/{job_id}/:
    get:
      tags:
        - 异步任务
      summary: 查询异步任务状态
      description: 所有异步操作（栅格导入、扫描、渲染、导出）均返回统一的任务对象
      operationId: getJobStatus
      security:
        - sessionAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/raster/tiles/{dataset_id}/{style_hash}/{z}/{x}/{y}.png:
    get:
      tags:
        - 栅格数据
      summary: 获取 XYZ 瓦片
      description: 获取渲染后的栅格 PNG 瓦片，供 Mapbox GL JS 消费
      operationId: getTile
      security:
        - sessionAuth: []
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: integer
          description: 栅格数据集 ID
        - name: style_hash
          in: path
          required: true
          schema:
            type: string
          description: 样式哈希
        - name: z
          in: path
          required: true
          schema:
            type: integer
          description: 缩放级别
        - name: x
          in: path
          required: true
          schema:
            type: integer
          description: 瓦片列号
        - name: 'y'
          in: path
          required: true
          schema:
            type: integer
          description: 瓦片行号
      responses:
        '200':
          description: PNG 瓦片
          content:
            image/png:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sessionid
      description: Django Session Cookie
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: 资源 ID
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
      description: 异步任务 ID
    LayerName:
      name: layer_name
      in: path
      required: true
      schema:
        type: string
      description: 统一 GeoPackage 中的矢量图层名称
  responses:
    BadRequest:
      description: 请求错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: 请求参数错误
    Unauthorized:
      description: 未认证
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: 请先登录
    Forbidden:
      description: 权限不足或 CSRF 校验失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: CSRF 验证失败
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: 未找到请求的资源
  schemas:
    ErrorResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: 错误描述信息
    DetailResponse:
      type: object
      required:
        - detail
      properties:
        detail:
          type: string
          description: 操作结果说明
    BootstrapResponse:
      type: object
      required:
        - systemName
        - allowRegistration
        - map
        - limits
      properties:
        systemName:
          type: string
          description: 系统显示名称
          example: 中亚胡杨林生态系统保护数据共享平台
        allowRegistration:
          type: boolean
          description: 是否允许用户自助注册
          example: true
        map:
          $ref: '#/components/schemas/MapConfig'
        limits:
          $ref: '#/components/schemas/SystemLimits'
    MapConfig:
      type: object
      required:
        - defaultCenter
        - defaultZoom
        - defaultBasemap
        - mapboxAccessToken
      properties:
        defaultCenter:
          type: array
          description: 默认地图中心点，经纬度顺序为 [longitude, latitude]
          minItems: 2
          maxItems: 2
          items:
            type: number
          example:
            - 87.6
            - 41.7
        defaultZoom:
          type: number
          description: 默认地图缩放级别
          example: 6.5
        defaultBasemap:
          type: string
          description: 默认 Mapbox 底图样式
          example: mapbox://styles/mapbox/satellite-streets-v12
        mapboxAccessToken:
          type: string
          description: 前端加载 Mapbox 服务所需 token
    SystemLimits:
      type: object
      required:
        - uploadMaxMb
        - queryResultLimit
      properties:
        uploadMaxMb:
          type: integer
          description: 单次上传文件大小上限，单位 MB
          example: 500
        queryResultLimit:
          type: integer
          description: 单次查询返回结果上限
          example: 30000
    HealthResponse:
      type: object
      required:
        - status
        - configLoaded
        - configFormat
        - appSubdirs
        - researchSubdirs
      properties:
        status:
          type: string
          description: 服务健康状态
          example: ok
        configLoaded:
          type: boolean
          description: TOML 配置是否已加载
          example: true
        configFormat:
          type: string
          enum:
            - toml
          description: 当前应用配置文件格式
          example: toml
        appSubdirs:
          type: array
          description: 业务数据根目录下固定子目录
          items:
            type: string
        researchSubdirs:
          type: array
          description: 科研数据根目录下固定子目录
          items:
            type: string
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名
        password:
          type: string
          format: password
          description: 密码，至少 6 位
        remember:
          type: boolean
          default: false
          description: 是否使用持久会话
    LoginResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: '#/components/schemas/UserInfo'
    RegisterRequest:
      type: object
      required:
        - username
        - password
        - passwordConfirm
      properties:
        username:
          type: string
          description: 用户名（唯一）
        email:
          type: string
          format: email
          description: 邮箱
        password:
          type: string
          format: password
          description: 密码
        passwordConfirm:
          type: string
          format: password
          description: 确认密码
    RegisterResponse:
      type: object
      required:
        - user
        - detail
      properties:
        user:
          $ref: '#/components/schemas/UserInfo'
        detail:
          type: string
          description: 注册结果说明
    UserInfoResponse:
      type: object
      required:
        - authenticated
        - user
      properties:
        authenticated:
          type: boolean
          description: 当前请求是否已认证
          example: true
        user:
          $ref: '#/components/schemas/BaseUserInfo'
    BaseUserInfo:
      type: object
      required:
        - id
        - username
        - displayName
        - email
        - avatarUrl
        - department
        - isStaff
        - isSuperuser
        - roles
        - permissions
      properties:
        id:
          type: integer
          description: 用户 ID
        username:
          type: string
          description: 登录用户名
        displayName:
          type: string
          description: 展示名称
        email:
          type: string
          description: 用户邮箱
        avatarUrl:
          type: string
          description: 用户头像 URL，为空字符串表示未设置
        department:
          type: string
          description: 用户所在部门，为空字符串表示未设置
        isStaff:
          type: boolean
          description: 是否具备 Django staff 标记
        isSuperuser:
          type: boolean
          description: 是否带有 Django superuser 标记；初始化的 admin 完整功能账号通常为 false
        roles:
          type: array
          description: 用户所属 Django Group 名称列表
          items:
            type: string
        permissions:
          $ref: '#/components/schemas/UserPermissions'
    UserPermissions:
      type: object
      required:
        - canAccessAdmin
        - canManageFeaturePermissions
        - canCreateUser
        - canViewOperationLogs
        - canViewAllOperationLogs
        - canViewOwnOperationLogs
        - canViewGroupOperationLogs
        - canManageSystemSettings
        - canManageAuth
        - canViewDashboardResourceCard
        - canViewDashboardLayerCard
        - canViewDashboardRasterCard
        - canViewDashboardUserCard
        - canViewDashboardActiveUsersCard
        - canViewDashboardSystemCard
        - canBrowseData
        - canQueryData
        - canLoadVectorLayer
        - canLoadRasterLayer
        - canUseCustomSymbolization
        - canExportData
        - canMaintainData
        - canManageRasterData
      properties:
        canAccessAdmin:
          type: boolean
          description: 当前登录会话是否可访问管理后台。后台入口对所有登录用户开放，因此认证用户恒为 true；后台内部内容由其他细粒度权限控制。
        canManageFeaturePermissions:
          type: boolean
          description: 是否可配置功能权限
        canCreateUser:
          type: boolean
          description: 是否可在后台创建新用户
        canViewOperationLogs:
          type: boolean
          description: 是否可查看操作日志
        canViewAllOperationLogs:
          type: boolean
          description: 是否可查看所有用户日志
        canViewOwnOperationLogs:
          type: boolean
          description: 是否可查看自己的日志
        canViewGroupOperationLogs:
          type: boolean
          description: 是否可查看指定用户组日志
        canManageSystemSettings:
          type: boolean
          description: 是否可修改系统设置
        canManageAuth:
          type: boolean
          description: 是否可修改认证授权
        canViewDashboardResourceCard:
          type: boolean
          description: 是否可查看 Dashboard 数据资源卡片
        canViewDashboardLayerCard:
          type: boolean
          description: 是否可查看 Dashboard 图层数卡片
        canViewDashboardRasterCard:
          type: boolean
          description: 是否可查看 Dashboard 栅格数量卡片
        canViewDashboardUserCard:
          type: boolean
          description: 是否可查看 Dashboard 用户数量卡片
        canViewDashboardActiveUsersCard:
          type: boolean
          description: 是否可查看 Dashboard 活跃用户卡片
        canViewDashboardSystemCard:
          type: boolean
          description: 是否可查看 Dashboard 系统信息
        canBrowseData:
          type: boolean
          description: 是否可浏览数据目录
        canQueryData:
          type: boolean
          description: 是否可查询数据
        canLoadVectorLayer:
          type: boolean
          description: 是否可加载矢量图层
        canLoadRasterLayer:
          type: boolean
          description: 是否可加载栅格图层
        canUseCustomSymbolization:
          type: boolean
          description: 是否可提交自定义符号化规则
        canExportData:
          type: boolean
          description: 是否可导出数据
        canMaintainData:
          type: boolean
          description: 是否可维护数据资源
        canManageRasterData:
          type: boolean
          description: 是否可管理栅格数据集
    AdminPermissionItem:
      type: object
      required:
        - id
        - label
        - group
      properties:
        id:
          type: string
          description: 权限完整标识，格式为 app_label.codename
          example: core.view_operation_logs
        label:
          type: string
          description: 权限中文名称
          example: 查看操作日志
        group:
          type: string
          description: 权限在管理界面中的分组名称，当前按后台权限、数据权限、人员权限归类
          example: 后台权限
    AdminProfileResponse:
      type: object
      required:
        - user
        - avatarUrl
        - department
        - grantedPermissions
        - disabledPermissions
        - effectivePermissions
        - availablePermissions
      properties:
        user:
          $ref: '#/components/schemas/UserInfo'
        avatarUrl:
          type: string
          description: 当前用户头像 URL
        department:
          type: string
          description: 当前用户部门
        grantedPermissions:
          type: array
          description: 上级授予当前用户的功能权限列表
          items:
            type: string
        disabledPermissions:
          type: array
          description: 当前用户主动关闭的已授予权限列表
          items:
            type: string
        effectivePermissions:
          type: array
          description: 授予权限扣除主动关闭权限后的实际生效权限列表
          items:
            type: string
        availablePermissions:
          type: array
          description: 管理后台可展示的功能权限元数据
          items:
            $ref: '#/components/schemas/AdminPermissionItem'
    AdminProfileUpdateRequest:
      type: object
      properties:
        username:
          type: string
          description: 新用户名
        displayName:
          type: string
          description: 新展示名称
        email:
          type: string
          format: email
          description: 新邮箱
        avatarUrl:
          type: string
          description: 新头像 URL
        department:
          type: string
          description: 新部门
    AdminProfilePermissionsRequest:
      type: object
      required:
        - disabledPermissions
      properties:
        disabledPermissions:
          type: array
          description: 用户主动关闭的权限列表，必须全部属于 grantedPermissions
          items:
            type: string
    AdminProfilePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
        - passwordConfirm
      properties:
        currentPassword:
          type: string
          format: password
          description: 当前登录密码
        newPassword:
          type: string
          format: password
          description: 新密码，至少 6 位
        passwordConfirm:
          type: string
          format: password
          description: 新密码确认值，必须与 newPassword 一致
    AdminOperationLog:
      type: object
      required:
        - id
        - occurredAt
        - operator
        - module
        - action
        - result
        - ipAddress
        - summary
      properties:
        id:
          type: integer
          description: 操作日志 ID
        occurredAt:
          type: string
          description: 本地时区格式化后的操作时间
          example: '2026-06-05 09:31:42'
        operator:
          type: string
          description: 操作用户显示名称，系统操作显示为“系统”
        module:
          type: string
          description: 操作所属模块
        action:
          type: string
          description: 操作动作
        result:
          type: string
          enum:
            - success
            - warning
            - failed
          description: 操作结果
        ipAddress:
          type: string
          description: 客户端 IP 地址，为空字符串表示未记录
        summary:
          type: string
          description: 操作摘要
    AdminOperationLogListResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          description: 当前页操作日志
          items:
            $ref: '#/components/schemas/AdminOperationLog'
        total:
          type: integer
          description: 符合筛选条件的总记录数
    AdminDashboardResponse:
      type: object
      required:
        - generatedAt
        - cards
      properties:
        generatedAt:
          type: string
          format: date-time
          description: Dashboard 统计生成时间
        cards:
          $ref: '#/components/schemas/AdminDashboardCards'
    AdminDashboardCards:
      type: object
      properties:
        resources:
          $ref: '#/components/schemas/AdminDashboardResourceCard'
        layers:
          $ref: '#/components/schemas/AdminDashboardLayerCard'
        rasters:
          $ref: '#/components/schemas/AdminDashboardRasterCard'
        users:
          $ref: '#/components/schemas/AdminDashboardUserCard'
        activeUsers:
          $ref: '#/components/schemas/AdminDashboardActiveUsers'
      description: 按当前用户卡片权限返回的 Dashboard 卡片数据；未授权卡片字段会被省略。
    AdminDashboardResourceCard:
      type: object
      required:
        - total
        - active
      properties:
        total:
          type: integer
          description: 数据资源总数
        active:
          type: integer
          description: 启用状态的数据资源数量
    AdminDashboardLayerCard:
      type: object
      required:
        - total
        - active
      properties:
        total:
          type: integer
          description: 图层总数
        active:
          type: integer
          description: 启用状态的图层数量
    AdminDashboardRasterCard:
      type: object
      required:
        - resources
        - datasets
        - layers
      properties:
        resources:
          type: integer
          description: 栅格数据资源数量
        datasets:
          type: integer
          description: 栅格数据集数量
        layers:
          type: integer
          description: 栅格图层数量
    AdminDashboardUserCard:
      type: object
      required:
        - total
        - active
        - disabled
        - groups
        - vectorResources
        - tableResources
      properties:
        total:
          type: integer
          description: 系统用户总数
        active:
          type: integer
          description: 启用账号数量
        disabled:
          type: integer
          description: 停用账号数量
        groups:
          type: integer
          description: 用户组数量
        vectorResources:
          type: integer
          description: 矢量数据资源数量
        tableResources:
          type: integer
          description: 表格数据资源数量
    AdminDashboardActiveUsers:
      type: object
      required:
        - period
        - rangeStart
        - rangeEnd
        - count
        - loginCount
        - series
        - ranking
      properties:
        period:
          type: string
          enum:
            - day
            - week
            - month
          description: 活跃用户统计周期
        rangeStart:
          type: string
          format: date
          description: 统计周期起始日期
        rangeEnd:
          type: string
          format: date
          description: 统计周期结束日期
        count:
          type: integer
          description: 周期内成功登录的去重用户数量
        loginCount:
          type: integer
          description: 周期内成功登录总次数
        series:
          type: array
          description: 柱状图序列，day 按小时统计，week/month 按日期统计
          items:
            $ref: '#/components/schemas/AdminDashboardActiveUserSeriesItem'
        ranking:
          type: array
          description: 周期内登录次数最多的用户排名
          items:
            $ref: '#/components/schemas/AdminDashboardActiveUserRank'
    AdminDashboardActiveUserSeriesItem:
      type: object
      required:
        - key
        - label
        - count
      properties:
        key:
          type: string
          description: 序列项唯一键，day 为小时值，week/month 为日期
        label:
          type: string
          description: 序列项显示标签
        count:
          type: integer
          description: 该序列项内成功登录次数
    AdminDashboardActiveUserRank:
      type: object
      required:
        - userId
        - displayName
        - username
        - loginCount
      properties:
        userId:
          type: integer
          description: 用户 ID
        displayName:
          type: string
          description: 用户显示名称
        username:
          type: string
          description: 用户名
        loginCount:
          type: integer
          description: 周期内成功登录次数
    AdminDashboardServerResponse:
      type: object
      required:
        - generatedAt
        - hostname
        - platform
        - cards
      properties:
        generatedAt:
          type: string
          format: date-time
          description: 服务器监控快照生成时间
        hostname:
          type: string
          description: 主机名
        platform:
          type: string
          description: 操作系统平台描述
        cards:
          $ref: '#/components/schemas/AdminDashboardServerCards'
    AdminDashboardServerCards:
      type: object
      properties:
        cpu:
          $ref: '#/components/schemas/AdminDashboardCpuInfo'
        memory:
          $ref: '#/components/schemas/AdminDashboardMemoryInfo'
        disks:
          $ref: '#/components/schemas/AdminDashboardDiskInfo'
      description: 按当前用户卡片权限返回的服务器监控卡片数据；未授权卡片字段会被省略。
    AdminDashboardCpuInfo:
      type: object
      required:
        - model
        - physicalCount
        - logicalCount
        - usagePercent
        - loadAverage
      properties:
        model:
          type: string
          description: CPU 型号
        physicalCount:
          type: integer
          description: CPU 物理核心数量
        logicalCount:
          type: integer
          description: CPU 逻辑核心数量
        usagePercent:
          type: number
          format: float
          description: 基于 1 分钟负载估算的 CPU 使用率百分比
        loadAverage:
          type: array
          description: 1 分钟、5 分钟、15 分钟系统负载
          minItems: 3
          maxItems: 3
          items:
            type: number
            format: float
    AdminDashboardMemoryInfo:
      type: object
      required:
        - model
        - slotCount
        - totalBytes
        - usedBytes
        - availableBytes
        - usagePercent
      properties:
        model:
          type: string
          description: 内存型号或来源说明
        slotCount:
          type: integer
          description: 可识别的内存数量
