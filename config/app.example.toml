[system]
name = "Data Sharing Platform"
mode = "development"
allow_registration = true

[storage]
app_data = "/path/to/data/business"
geographic_data_root = "/path/to/data/geographic"
auto_create_directories = true

[map]
default_center = [80.0, 41.5]
default_zoom = 4.5
default_basemap = "osm"

[limits]
upload_max_mb = 512
query_result_limit = 30000

[raster]
symbolizer_timeout_seconds = 120
default_symbolizer_script = "scripts/raster_symbolizers/basic_gradient.py"
