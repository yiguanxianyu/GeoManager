<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">中亚胡杨林生态保护数据共享平台 Logo</title>
  <desc id="desc">纯白色盾牌、胡杨树、数据节点、地理网格和数据图层元素构成的科技生态保护平台标志。</desc>
  <defs>
    <radialGradient id="bgGlow" cx="62%" cy="33%" r="72%">
      <stop offset="0%" stop-color="#0b4a5c"/>
      <stop offset="48%" stop-color="#082742"/>
      <stop offset="100%" stop-color="#020914"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .white{fill:none;stroke:#ffffff;stroke-width:34;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#ffffff;stroke-width:16;stroke-linecap:round;stroke-linejoin:round}
      .hair{fill:none;stroke:#ffffff;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .fill{fill:#ffffff}
      .text{fill:#ffffff;font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC","Source Han Sans SC",Arial,sans-serif;font-size:64px;font-weight:800;letter-spacing:2px}
    </style>
  </defs>

  <!-- dark technology background -->
  <rect width="1200" height="1200" fill="url(#bgGlow)"/>
  <circle cx="820" cy="280" r="360" fill="#0b5c67" opacity="0.10"/>
  <circle cx="360" cy="820" r="420" fill="#0b2f53" opacity="0.18"/>

  <!-- icon group -->
  <g transform="translate(0,-20)" filter="url(#softShadow)">
    <!-- protection shield -->
    <path class="white" d="M600 190
      C505 255 410 300 315 322
      L315 530
      C315 715 426 842 600 930
      C774 842 885 715 885 530
      L885 322
      C790 300 695 255 600 190Z"/>

    <!-- simplified poplar canopy -->
    <path class="fill" d="M420 470
      C405 424 443 390 487 398
      C499 360 544 346 573 371
      C598 327 659 335 676 380
      C721 362 765 392 760 435
      C803 441 819 487 788 516
      C748 552 690 533 669 498
      C640 536 575 537 546 499
      C520 535 455 528 420 470Z"/>

    <!-- tree trunk and branches: negative-like white core -->
    <path class="fill" d="M558 492
      C552 575 550 650 531 726
      C523 757 503 789 484 813
      L716 813
      C695 788 675 756 668 727
      C649 650 648 575 642 492
      C626 544 612 588 600 641
      C589 589 575 544 558 492Z"/>
    <path class="thin" d="M597 635 C560 594 517 558 466 532"/>
    <path class="thin" d="M603 634 C643 590 684 558 733 535"/>
    <path class="thin" d="M577 560 C548 530 516 507 480 492"/>
    <path class="thin" d="M623 560 C654 530 686 507 720 492"/>
    <path class="hair" d="M600 642 L600 472"/>

    <!-- data sharing circuit lines -->
    <g>
      <path class="thin" d="M260 510 H345 L382 475 H442"/>
      <path class="thin" d="M260 590 H430"/>
      <path class="thin" d="M270 665 H398"/>
      <path class="thin" d="M740 475 H810 L846 510 H940"/>
      <path class="thin" d="M770 590 H940"/>
      <path class="thin" d="M802 665 H930"/>
      <circle class="fill" cx="260" cy="510" r="14"/>
      <circle class="fill" cx="260" cy="590" r="14"/>
      <circle class="fill" cx="270" cy="665" r="14"/>
      <circle class="fill" cx="940" cy="510" r="14"/>
      <circle class="fill" cx="940" cy="590" r="14"/>
      <circle class="fill" cx="930" cy="665" r="14"/>
    </g>

    <!-- geospatial grid and data layers -->
    <g>
      <path class="thin" d="M330 790 C420 742 780 742 870 790"/>
      <path class="hair" d="M360 845 C455 796 745 796 840 845"/>
      <path class="hair" d="M395 775 C438 815 470 845 505 865"/>
      <path class="hair" d="M805 775 C762 815 730 845 695 865"/>
      <path class="hair" d="M600 750 V880"/>
      <path class="thin" d="M600 808 L716 860 L600 912 L484 860 Z"/>
      <path class="thin" d="M522 930 L600 965 L678 930"/>
      <path class="thin" d="M552 984 L600 1005 L648 984"/>
    </g>
  </g>

  <!-- wordmark -->
  <text class="text" x="600" y="1055" text-anchor="middle">中亚胡杨林生态保护数据共享平台</text>
</svg>
