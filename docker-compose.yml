services:
  django:
    build:
      context: .
      target: django
    image: data-platform-django:latest
    restart: unless-stopped
    environment:
      APP_CONFIG: /config/app.toml
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS}
      APP_DISABLE_RASTER_STARTUP_SCAN: ${APP_DISABLE_RASTER_STARTUP_SCAN}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN}
    volumes:
      - ${APP_CONFIG}:/config/app.toml:ro
      - ${APP_DATA_HOST}:/data/app
      - ${RESEARCH_DATA_HOST}:/data/research
    expose:
      - "8000"

  nginx:
    build:
      context: .
      target: nginx
    image: data-platform-nginx:latest
    restart: unless-stopped
    depends_on:
      - django
    environment:
      DJANGO_UPSTREAM: ${DJANGO_UPSTREAM}
      APP_DATA_ROOT: /data/app
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE}
    ports:
      - "${APP_HTTP_PORT}:80"
    volumes:
      - ${APP_DATA_HOST}:/data/app