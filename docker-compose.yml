services:
  django:
    build:
      context: .
      target: django
    image: data-platform-django:latest
    restart: unless-stopped
    environment:
      APP_CONFIG: /config/app.toml
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      APP_DISABLE_RASTER_STARTUP_SCAN: ${APP_DISABLE_RASTER_STARTUP_SCAN:-0}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
    volumes:
      - ${APP_CONFIG_FILE:-./config/app.example.toml}:/config/app.toml:ro
      - ./data/business:/data/business
      - ./data/geographic:/data/geographic
    expose:
      - "8000"

  nginx:
    build:
      context: .
      target: nginx
    image: data-platform-nginx:latest
    restart: unless-stopped
    depends_on:
      - django
    environment:
      DJANGO_UPSTREAM: django:8000
      BUSINESS_ROOT: /data/business
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    volumes:
      - ./data/business:/data/business
